name: Collect TFT Meta

on:
  schedule:
    - cron: '15 * * * *'     # la fiecare ora (la :15)
  workflow_dispatch:

concurrency:
  group: tft-collect-main
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect-patch:
    name: Patch Notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect Patch Notes
        run: node scripts/collect-patch.js --data-dir data
        continue-on-error: true

      - name: Upload Patch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch-data
          path: |
            data/patch-notes.json
          if-no-files-found: ignore

  collect-meta:
    name: Meta Comps
    needs: collect-patch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect Meta
        run: node scripts/collect-meta.js --set 17 --data-dir data
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Validate Meta JSON
        run: |
          node -e "const fs=require('fs'); const path='data/meta-17.json'; const raw=fs.readFileSync(path,'utf8'); const json=JSON.parse(raw); if(!Array.isArray(json.comps)) throw new Error('meta-17.json missing comps array'); if(json.comps.length < 20) throw new Error('meta-17.json has too few comps: ' + json.comps.length); const withPositions=json.comps.filter(c=>c && c.positions && Object.keys(c.positions).length>0).length; if(withPositions < 5) throw new Error('meta-17.json has too few comps with positions: ' + withPositions); console.log(JSON.stringify({comps: json.comps.length, withPositions, confirmedCount: json.confirmedCount ?? 0, updatedAt: json.updatedAt}, null, 2));"

      - name: Upload Meta Artifact
        uses: actions/upload-artifact@v4
        with:
          name: meta-data
          path: |
            data/meta-17.json
          if-no-files-found: ignore

  commit-data:
    name: Commit Data
    needs: [collect-patch, collect-meta]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Collected Artifacts
        uses: actions/download-artifact@v4
        with:
          path: data
          merge-multiple: true

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node -e "const fs=require('fs'); const path='data/meta-17.json'; if(fs.existsSync(path)){ const json=JSON.parse(fs.readFileSync(path,'utf8')); const withPositions=(json.comps||[]).filter(c=>c && c.positions && Object.keys(c.positions).length>0).length; if((json.comps||[]).length < 20) throw new Error('Refusing commit: meta-17.json too small'); if(withPositions < 5) throw new Error('Refusing commit: meta-17.json missing positions'); console.log('Meta validation before commit OK:', JSON.stringify({comps:(json.comps||[]).length, withPositions})); }"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit"
          else
            git commit -m "chore: collect TFT data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git pull --rebase origin main
            git push origin main
          fi
