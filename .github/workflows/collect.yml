name: Collect TFT Meta & Challenger

on:
  schedule:
    - cron: '15 * * * *'     # la fiecare ora (la :15)
  workflow_dispatch:

concurrency:
  group: tft-collect-main
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect-patch:
    name: Patch Notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect Patch Notes
        run: node scripts/collect-patch.js --data-dir data
        continue-on-error: true

  collect-meta:
    name: Meta Comps
    needs: collect-patch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect Meta
        run: node scripts/collect-meta.js --set 17 --data-dir data
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

  collect-challenger:
    name: Challenger EUW
    needs: collect-patch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect EUW
        run: node scripts/collect-challenger.js --region euw --set 17 --limit 40 --data-dir data
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Merge challenger sources
        run: node scripts/merge-challenger-sources.js --set 17 --data-dir data

  commit-data:
    name: Commit Data
    needs: [collect-patch, collect-meta, collect-challenger]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect Patch Notes
        run: node scripts/collect-patch.js --data-dir data
        continue-on-error: true

      - name: Collect Meta
        run: node scripts/collect-meta.js --set 17 --data-dir data
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Collect EUW
        run: node scripts/collect-challenger.js --region euw --set 17 --limit 40 --data-dir data
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Merge challenger sources
        run: node scripts/merge-challenger-sources.js --set 17 --data-dir data

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit"
          else
            git commit -m "chore: collect TFT data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git pull --rebase origin main
            git push origin main
          fi
